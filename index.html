<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <meta
      name="description"
      content="Care Learning - Compassionate care services and professional education programs for seniors. Home care, PSW training, foot care, and more in Saint John, NB."
    />
    <meta
      name="keywords"
      content="senior care, home care, PSW, personal support worker, foot care, Saint John, New Brunswick, elderly care, healthcare training"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ✅ Open Graph (WhatsApp / Facebook) -->
    <meta property="og:title" content="Care Learning" />
    <meta
      property="og:description"
      content="Compassionate care services and professional education programs for seniors. Home care, PSW training, foot care, and more in Saint John, NB."
    />
    <meta
      property="og:image"
      content="https://carelearning.ca/preview.jpg"
    />
    <meta property="og:url" content="https://carelearning.ca/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Care Learning" />

    <!-- ✅ Twitter (Optional but good) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Care Learning" />
    <meta
      name="twitter:description"
      content="Compassionate care services and professional education programs."
    />
    <meta
      name="twitter:image"
      content="https://carelearning.ca/preview.jpg"
    />

    <!-- Title -->
    <title>Care Learning</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
